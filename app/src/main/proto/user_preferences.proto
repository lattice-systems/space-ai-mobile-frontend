syntax = "proto3";

option java_package = "org.utl.idgs901.space_ai_mobile.core.datastore";
option java_multiple_files = true;

message UserPreferencesProto {
  bool reduce_animations = 1;
  bool high_contrast = 2;
  string font_size = 3;
  bool screen_reader_enabled = 4;
  bool haptic_feedback_enabled = 5;
  bool advanced_accessibility_mode = 6;
}
