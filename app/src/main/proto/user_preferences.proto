syntax = "proto3";

option java_package = "org.utl.idgs901.space_ai_mobile.core.datastore";
option java_multiple_files = true;

message UserPreferencesProto {
  bool reduce_animations = 1;
  bool high_contrast = 2;
  float font_scale = 3;
  bool haptics_enabled = 4;
  bool advanced_accessibility = 5;
}
